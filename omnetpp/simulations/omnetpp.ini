#            Statistici


**.scalar-recording = true
**.vector-recording = true

*.**.nic.phy80211p.**.vector-recording = false
*.**.nic.mac1609_4.**.vector-recording = false

*.node[*].veinsmobility.vector-recording = false
*.node[*].veinsmobility.scalar-recording = true
*.node[*].appl.scalar-recording = true
*.node[*].appl.vector-recording = false

*.rsu[*].appl.scalar-recording = true
*.rsu[*].appl.vector-recording = true


#    Visuals

*.annotations.draw = true


# repeat
repeat = 3
seed-set = ${repetition}
*.manager.seed = ${repetition}




# NOAPTE 

[Config Noapte_1_GreenWave]
description = "Trafic de noapte cu unda verde statica (fara control dinamic)"
*.manager.launchConfig = xmldoc("scenariu_noapte_dinamic.launchd.xml")
*.rsu[*].appl.dynamicControlEnabled = false
*.rsu[*].appl.debugHeading          = false
*.rsu[*].appl.stopSpeedThreshold    = 3.0
output-scalar-file = ${resultdir}/${configname}-${iterationvars}-${repetition}.sca
output-vector-file = ${resultdir}/${configname}-${iterationvars}-${repetition}.vec

[Config Noapte_2_Dinamic]
description = "Trafic de noapte cu control dinamic adaptiv (controller se abtine la cerere mica)"
*.manager.launchConfig = xmldoc("scenariu_noapte_dinamic.launchd.xml")
*.rsu[*].appl.dynamicControlEnabled = true
*.rsu[*].appl.debugHeading          = false
*.rsu[*].appl.highThreshold         = 5
*.rsu[*].appl.lowThreshold          = 2
*.rsu[*].appl.intervalCycles        = 5
*.rsu[*].appl.sampleCycles          = 3
*.rsu[*].appl.queueRange            = 150
*.rsu[*].appl.stopSpeedThreshold    = 3.0
output-scalar-file = ${resultdir}/${configname}-${iterationvars}-${repetition}.sca
output-vector-file = ${resultdir}/${configname}-${iterationvars}-${repetition}.vec


